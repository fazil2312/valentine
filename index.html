<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will you go on a date with me? 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #c0394b;
    --blush: #f7d6db;
    --petal: #fdf0f2;
    --deep: #6b1a27;
    --cream: #fff9f0;
    --gold: #e8a87c;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    font-family: 'Lora', serif;
    overflow: hidden;
    cursor: default;
  }

  /* Petal rain */
  .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .petal {
    position: absolute;
    top: -40px;
    font-size: 1.4rem;
    animation: fall linear infinite;
    opacity: 0.7;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(360deg) translateX(40px); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    background: white;
    border-radius: 28px;
    padding: 56px 52px 52px;
    max-width: 440px;
    width: 90vw;
    text-align: center;
    box-shadow: 0 8px 60px rgba(192,57,75,0.18), 0 2px 12px rgba(0,0,0,0.06);
    animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    from { transform: scale(0.7) translateY(40px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  .envelope {
    font-size: 5rem;
    animation: float 3s ease-in-out infinite;
    display: block;
    margin-bottom: 24px;
    filter: drop-shadow(0 4px 12px rgba(192,57,75,0.25));
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%       { transform: translateY(-10px) rotate(3deg); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 5vw, 2.4rem);
    font-weight: 900;
    color: var(--rose);
    line-height: 1.2;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: #a07070;
    font-style: italic;
    font-size: 0.95rem;
    margin-bottom: 40px;
  }

  .buttons {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    min-height: 60px;
    position: relative;
  }

  .btn-yes, .btn-no {
    border: none;
    border-radius: 50px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-yes {
    background: var(--rose);
    color: white;
    font-size: 1.2rem;
    padding: 16px 44px;
    box-shadow: 0 6px 24px rgba(192,57,75,0.35);
    animation: pulsate 2s ease-in-out infinite;
  }
  @keyframes pulsate {
    0%, 100% { box-shadow: 0 6px 24px rgba(192,57,75,0.35); }
    50%       { box-shadow: 0 6px 36px rgba(192,57,75,0.6); }
  }
  .btn-yes:hover {
    transform: scale(1.08);
    background: var(--deep);
  }
  .btn-yes:active { transform: scale(0.96); }

  .btn-no {
    background: var(--blush);
    color: var(--rose);
    font-size: 1rem;
    padding: 12px 28px;
    position: absolute;
    /* starts near normal position, JS moves it */
    box-shadow: 0 2px 8px rgba(192,57,75,0.1);
  }
  .btn-no:hover { background: #f0c0c8; }

  /* Success screen */
  .success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .success.show { display: flex; }
  .success .big-emoji { font-size: 4rem; }
  .success h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--rose);
  }
  .success p { color: #a07070; font-style: italic; }

  /* hearts burst */
  .burst-heart {
    position: fixed;
    pointer-events: none;
    font-size: 1.8rem;
    z-index: 99;
    animation: burstAway 1s ease-out forwards;
  }
  @keyframes burstAway {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
  }

  /* Phone tip */
  .phone-tip {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(192,57,75,0.1);
    color: var(--rose);
    font-size: 0.78rem;
    padding: 8px 18px;
    border-radius: 50px;
    font-style: italic;
    white-space: nowrap;
    z-index: 5;
  }
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="card" id="card">
  <!-- Main question -->
  <div id="main">
    <span class="envelope">💌</span>
    <h1>Will you go on a date with me?</h1>
    <p class="subtitle">I promise it'll be worth it 🌹</p>
    <div class="buttons" id="btnArea">
      <button class="btn-yes" id="yesBtn">Yes! 🥰</button>
      <button class="btn-no" id="noBtn">No</button>
    </div>
  </div>

  <!-- Success -->
  <div class="success" id="success">
    <span class="big-emoji">🎉</span>
    <h2>Yay! It's a date! 💕</h2>
    <p>I can't wait to see you ✨</p>
  </div>
</div>

<div class="phone-tip" id="tip">📱 On phone? The "No" button will run away too!</div>

<script>
  // --- Falling petals ---
  const petals = document.getElementById('petals');
  const emojis = ['🌸','🌹','💕','✨','🌷','💝','🥀','🌺'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
    petals.appendChild(p);
  }

  // --- No button logic ---
  const noBtn = document.getElementById('noBtn');
  const btnArea = document.getElementById('btnArea');
  const yesBtn = document.getElementById('yesBtn');
  const main = document.getElementById('main');
  const success = document.getElementById('success');

  // Position tracking for No button
  let noX = 0, noY = 0;
  let isPhone = window.matchMedia('(pointer: coarse)').matches;

  function placeNoRandomly() {
    const card = document.getElementById('card');
    const cardRect = card.getBoundingClientRect();
    const noBtnW = noBtn.offsetWidth;
    const noBtnH = noBtn.offsetHeight;

    // Random position within viewport but avoid corners of card
    const margin = 20;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Bias away from yes button
    let nx, ny;
    let attempts = 0;
    do {
      nx = margin + Math.random() * (vw - noBtnW - margin * 2);
      ny = margin + Math.random() * (vh - noBtnH - margin * 2);
      attempts++;
    } while (attempts < 20);

    noBtn.style.position = 'fixed';
    noBtn.style.left = nx + 'px';
    noBtn.style.top = ny + 'px';
    noBtn.style.zIndex = 10;
    noX = nx; noY = ny;
  }

  // Desktop: move on mousemove near the button
  document.addEventListener('mousemove', (e) => {
    if (success.classList.contains('show')) return;
    const rect = noBtn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dist = Math.hypot(e.clientX - cx, e.clientY - cy);

    if (dist < 80) {
      runAway();
    }
  });

  // Mobile: move on touchmove
  document.addEventListener('touchmove', (e) => {
    if (success.classList.contains('show')) return;
    const t = e.touches[0];
    const rect = noBtn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dist = Math.hypot(t.clientX - cx, t.clientY - cy);
    if (dist < 90) runAway();
  }, { passive: true });

  // Also escape on direct touch of no button (last resort)
  noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    runAway();
  }, { passive: false });

  noBtn.addEventListener('mouseenter', runAway);

  function runAway() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const w = noBtn.offsetWidth;
    const h = noBtn.offsetHeight;
    const margin = 16;

    // Pick a spot far from current position
    let nx, ny, tries = 0;
    do {
      nx = margin + Math.random() * (vw - w - margin * 2);
      ny = margin + Math.random() * (vh - h - margin * 2);
      tries++;
    } while (Math.hypot(nx - noX, ny - noY) < 120 && tries < 30);

    noBtn.style.transition = 'left 0.25s cubic-bezier(0.34,1.56,0.64,1), top 0.25s cubic-bezier(0.34,1.56,0.64,1)';
    noBtn.style.left = nx + 'px';
    noBtn.style.top = ny + 'px';
    noX = nx; noY = ny;
  }

  // Init position
  window.addEventListener('load', () => {
    // Place no button slightly offset from yes
    noBtn.style.position = 'fixed';
    const yr = yesBtn.getBoundingClientRect();
    noBtn.style.left = (yr.right + 24) + 'px';
    noBtn.style.top = yr.top + 'px';
    noX = yr.right + 24;
    noY = yr.top;
  });

  // Yes button
  yesBtn.addEventListener('click', () => {
    burstHearts(yesBtn);
    setTimeout(() => {
      main.style.display = 'none';
      noBtn.style.display = 'none';
      success.classList.add('show');
      document.getElementById('tip').style.display = 'none';
    }, 400);
  });

  function burstHearts(from) {
    const r = from.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    for (let i = 0; i < 12; i++) {
      const h = document.createElement('div');
      h.className = 'burst-heart';
      h.textContent = ['💕','💖','💗','✨','🌸','💝'][Math.floor(Math.random()*6)];
      h.style.left = cx + 'px';
      h.style.top = cy + 'px';
      const angle = (Math.PI * 2 * i) / 12;
      const dist = 80 + Math.random() * 80;
      h.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      h.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1100);
    }
  }
</script>
</body>
</html>
